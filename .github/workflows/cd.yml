name: Build_Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Simulate deploy
        run: |
          mkdir release
          cp -r dist/* release/
          echo "Deploy tamamlandı 🚀"

      - name: Upload release
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release