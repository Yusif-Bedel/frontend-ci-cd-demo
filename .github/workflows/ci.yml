name: Build_Test

on:
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm test || echo "No tests"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist